<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>공부 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --panel:#ffffff; --line:#f0f0f0; --line2:#e4e4e4; --line3:#ededed;
    --ink:#3a352d; --ink2:#6b6457; --mut:#8a8273; --mut2:#a59f93; --faint:#c4c4c4;
    --btn:#4a4a4c; --btnstop:#5a5347;
    --accent:#3f5840;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;}
  html,body{margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:'Noto Serif KR', serif; overscroll-behavior:none;}
  body{display:flex; flex-direction:column; min-height:100vh; min-height:100dvh;}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  .hidden{display:none !important;}
  button,input,textarea{font-family:inherit;}

  /* ---------- app shell ---------- */
  #app{flex:1; display:flex; flex-direction:column; min-height:0;}
  .screen{flex:1; min-height:0; display:flex; flex-direction:column;}

  /* ---------- top bar ---------- */
  .topbar{display:flex; justify-content:space-between; align-items:baseline;
    padding:14px 24px 11px; border-bottom:1px solid var(--line); flex:0 0 auto;}
  .topbar .date{font-size:17px; font-weight:600; letter-spacing:0.3px;}
  .topbar .total{font-size:16px; font-weight:500; color:var(--ink2);}

  /* ---------- main: subject list + timeline ---------- */
  .main-body{flex:1; min-height:0; display:flex;}
  .subj-col{flex:0 0 48%; min-height:0; overflow-y:auto; padding:6px 12px 10px 22px;
    border-right:1px solid var(--line);}
  .grid-col{flex:1; min-height:0; overflow-y:auto; padding:8px 18px 12px 6px;}

  .subj-row{display:flex; align-items:center; gap:11px; padding:0 4px; height:var(--rowh,40px);
    border-bottom:1px solid var(--line); cursor:pointer; user-select:none;}
  .subj-row:active{background:#faf9f6;}
  .subj-row.running{background:#f5f6f2;}
  .swatch{width:4px; height:16px; border-radius:2px; flex:0 0 4px;}
  .sname{flex:1; font-size:15px;}
  .stime{font-size:13px; color:var(--mut); }
  .subj-row.running .stime{color:var(--accent); font-weight:500;}
  .add-row{display:flex; align-items:center; gap:10px; padding:11px 4px; color:var(--faint); cursor:pointer;}
  .add-circle{width:18px; height:18px; border:1px solid var(--line2); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:13px; line-height:1;}

  /* timeline */
  .grow{display:flex; align-items:stretch;}
  .ghour{flex:0 0 18px; font-size:10.5px; color:var(--faint); text-align:right; padding-right:6px;
    line-height:var(--cellh,15px);}
  .gcells{flex:1; display:flex; border-top:1px solid var(--line);}
  .gcell{flex:1; border-right:1px solid var(--line); overflow:hidden;}
  .gcell:last-child{border-right:none;}
  .gcell .seg{display:flex; height:100%; width:100%;}
  .gbottom{height:1px; background:var(--line); margin-left:18px;}

  /* ---------- bottom nav ---------- */
  .botnav{flex:0 0 auto; display:flex; align-items:center; gap:20px;
    padding:9px 24px calc(9px + env(safe-area-inset-bottom)); border-top:1px solid var(--line);}
  .nav-item{display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; color:var(--faint);}
  .nav-item.active{color:var(--ink);}
  .nav-item span{font-size:10px;}
  .nav-item svg{width:21px; height:21px;}
  .spacer{flex:1;}
  .today-btn{font-size:12px; color:var(--mut); border:1px solid var(--line2); border-radius:13px;
    padding:3px 12px; cursor:pointer;}
  .arrow{font-size:17px; color:var(--mut2); cursor:pointer; padding:0 4px; user-select:none;}

  /* ---------- timer screen ---------- */
  .timer-head{flex:0 0 auto; padding:14px 24px; border-bottom:1px solid var(--line);
    color:var(--mut2); font-size:14px; cursor:pointer;}
  .timer-body{flex:1; min-height:0; display:flex; align-items:center; justify-content:center;
    gap:46px; padding:24px 36px; flex-wrap:wrap;}
  .char-box{display:flex; flex-direction:column; align-items:center; gap:9px;}
  .char-img{width:190px; max-height:190px; border-radius:14px; object-fit:contain; background:transparent;}
  .char-empty{width:160px; height:160px; border-radius:18px; background:#f6f5f2;
    border:1px dashed var(--line2); display:flex; align-items:center; justify-content:center;
    color:#b8b2a4; font-size:12px;}
  .timer-center{display:flex; flex-direction:column; align-items:center;}
  .timer-subj{display:flex; align-items:center; gap:9px; margin-bottom:18px;}
  .timer-subj .swatch{width:5px; height:20px;}
  .timer-subj span{font-size:19px; font-weight:600;}
  .timer-clock{font-size:46px; font-weight:500; letter-spacing:1px; margin-bottom:6px;}
  .timer-info{font-size:12.5px; color:#b8b2a4; margin-bottom:28px; min-height:17px;}
  .timer-btn{width:104px; height:104px; border-radius:50%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px; cursor:pointer; color:#fff;
    user-select:none; transition:transform .1s; background:var(--btn);}
  .timer-btn:active{transform:scale(.96);}
  .timer-btn .lbl{font-size:12px;}
  .timer-totals{margin-top:24px; display:flex; gap:20px; font-size:13px; color:var(--mut);}
  .timer-totals b{font-weight:600; color:var(--btnstop);}
  .timer-totals .div{color:#ddd;}

  /* ---------- generic screen head ---------- */
  .scr-head{flex:0 0 auto; padding:15px 24px; border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; gap:10px;}
  .scr-head .back{font-size:14px; color:var(--mut2); cursor:pointer;}
  .scr-head .t{font-size:17px; font-weight:600;}
  .scr-head .sub{font-size:13px; color:var(--mut2);}
  .scr-body{flex:1; min-height:0; overflow-y:auto;}

  /* ---------- stats ---------- */
  .stats-cols{display:flex; min-height:0;}
  .stats-left{flex:0 0 50%; padding:20px 22px; border-right:1px solid var(--line);}
  .stats-right{flex:1; padding:20px 22px;}
  .sec-label{font-size:13px; color:var(--mut2); margin-bottom:16px;}
  .bars{display:flex; align-items:flex-end; justify-content:space-between; height:130px; gap:8px;}
  .bar-wrap{flex:1; display:flex; align-items:flex-end; justify-content:center; height:100%;}
  .bar{width:60%; border-radius:3px 3px 0 0; min-height:2px; background:#9aa98b;}
  .bar-labels{display:flex; justify-content:space-between; margin-top:8px;}
  .bar-labels span{flex:1; text-align:center; font-size:11px; color:var(--faint);}
  .bar-labels span.today{color:var(--ink);}
  .subjbar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .subjbar-name{flex:0 0 56px; font-size:13px;}
  .subjbar-track{flex:1; background:#f3f2ee; border-radius:5px; height:15px; overflow:hidden;}
  .subjbar-fill{height:100%;}
  .subjbar-time{flex:0 0 52px; font-size:11.5px; color:var(--mut); text-align:right;}

  /* ---------- goal ---------- */
  .goal-cols{display:flex; min-height:0;}
  .goal-left{flex:0 0 44%; padding:24px 22px; border-right:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center;}
  .goal-right{flex:1; padding:22px 24px; display:flex; flex-direction:column;}
  .ring-wrap{position:relative; width:130px; height:130px;}
  .ring-pct{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:600;}
  .goal-sub{margin-top:16px; font-size:14px; color:var(--mut);}
  .goal-sub b{font-weight:600; color:var(--btnstop);}
  .mini-btn{margin-top:13px; font-size:12.5px; color:var(--mut); background:none;
    border:1px solid var(--line2); border-radius:9px; padding:6px 14px; cursor:pointer;}
  .memo-area{width:100%; flex:1; min-height:90px; border:1px solid var(--line3); border-radius:10px;
    padding:13px; font-size:14px; line-height:1.7; color:var(--ink); resize:none; background:var(--panel);}
  .memo-area:focus{outline:none; border-color:var(--accent);}
  .save-btn{align-self:flex-end; margin-top:11px; font-size:13px; color:#fff; background:var(--accent);
    border:none; border-radius:9px; padding:7px 20px; cursor:pointer;}
  .reset-row{display:flex; gap:10px; margin-top:18px; padding-top:16px; border-top:1px solid var(--line);}
  .reset-btn{flex:1; font-size:13px; background:none; border:1px solid var(--line2);
    border-radius:9px; padding:9px; cursor:pointer; color:var(--mut);}
  .reset-btn.full{color:#9a6b6b; border-color:#e3d3d3;}

  /* ---------- settings ---------- */
  .set-cols{display:flex; min-height:0;}
  .set-left{flex:0 0 42%; padding:18px 20px; border-right:1px solid var(--line);}
  .set-right{flex:1; padding:18px 20px;}
  .subj-edit-item{display:flex; align-items:center; gap:9px; padding:8px 0; border-bottom:1px solid var(--line);}
  .subj-edit-item .swatch{width:5px; height:16px;}
  .subj-edit-item .nm{flex:1; font-size:14px;}
  .subj-edit-item .ed{font-size:13px; color:var(--mut2); cursor:pointer; padding:2px 4px;}
  .subj-edit-item .del{font-size:16px; color:#c8a0a0; cursor:pointer; padding:2px 6px;}
  .add-line{display:flex; gap:8px; margin-top:12px;}
  .add-line input{flex:1; font-size:13px; padding:8px 10px; border:1px solid var(--line2); border-radius:8px;}
  .add-line button{font-size:13px; background:var(--accent); color:#fff; border:none;
    border-radius:8px; padding:0 14px; cursor:pointer;}
  .theme-item{display:flex; align-items:center; gap:11px; padding:10px 11px; margin-bottom:7px;
    border:1px solid var(--line3); border-radius:10px; cursor:pointer;}
  .theme-item.sel{border-color:#b9c7ad; background:#f3f6ef;}
  .theme-swatch{display:flex; border-radius:5px; overflow:hidden; width:84px; height:20px; flex:0 0 84px;}
  .theme-swatch div{flex:1;}
  .theme-name{flex:1; font-size:13.5px;}
  .theme-check{font-size:13px; color:#5a7350;}

  /* ---------- modal ---------- */
  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center;
    justify-content:center; z-index:50; padding:24px;}
  .modal{background:var(--panel); border-radius:16px; padding:22px 20px; width:100%; max-width:340px;}
  .modal h3{margin:0 0 8px; font-size:16px; font-weight:600;}
  .modal p{margin:0 0 16px; font-size:13.5px; color:var(--mut); line-height:1.5;}
  .modal input{width:100%; padding:10px; border:1px solid var(--line2); border-radius:9px; font-size:15px; margin-bottom:8px;}
  .modal-row{display:flex; gap:9px; margin-top:8px;}
  .modal-btn{flex:1; padding:11px; border-radius:9px; font-size:14px; cursor:pointer; border:none;}
  .modal-btn.ghost{background:#f1f0ec; color:var(--mut);}
  .modal-btn.solid{background:var(--accent); color:#fff;}
  .modal-btn.danger{background:#9a6b6b; color:#fff;}
  .color-grid{display:flex; flex-wrap:wrap; gap:8px; margin:4px 0 12px;}
  .color-dot{width:30px; height:30px; border-radius:8px; cursor:pointer; border:2px solid transparent;}
  .color-dot.sel{border-color:#3a352d;}

  /* ---------- workbook ---------- */
  .wb-sort{flex:0 0 auto; display:flex; gap:14px; padding:11px 24px 4px; font-size:12px; align-items:center;}
  .wb-sort .lbl{color:var(--mut2);}
  .wb-sort .opt{color:var(--faint); cursor:pointer; padding:0 2px;}
  .wb-sort .opt.sel{color:var(--accent); border-bottom:1px solid var(--accent);}
  .wb-card{border:1px solid var(--line3); border-radius:11px; padding:13px 14px; margin-bottom:9px;
    display:flex; align-items:center; gap:11px; cursor:pointer; background:var(--panel);}
  .wb-card:active{background:#fafaf8;}
  .wb-card.done{background:#fafaf8;}
  .wb-card .bar{width:4px; height:36px; border-radius:2px; flex:0 0 4px;}
  .wb-card .body{flex:1; min-width:0;}
  .wb-card .top{display:flex; align-items:baseline; gap:7px; margin-bottom:6px; flex-wrap:wrap;}
  .wb-card .nm{font-size:14.5px; font-weight:500;}
  .wb-card .sb{font-size:11.5px; color:var(--mut2);}
  .wb-card .pg{font-size:11.5px; color:var(--mut); margin-left:auto;}
  .wb-card.done .pg{color:#5a7350;}
  .wb-card .row{display:flex; align-items:center; gap:9px;}
  .wb-card .track{flex:1; background:#f3f2ee; border-radius:4px; height:8px; overflow:hidden;}
  .wb-card .fill{height:100%; border-radius:4px;}
  .wb-card .pct{font-size:12px; color:var(--btnstop); font-weight:500; flex:0 0 36px; text-align:right;}
  .wb-card.done .pct{color:#5a7350; font-weight:600;}
  .wb-empty{padding:40px 20px; text-align:center; color:var(--faint); font-size:13.5px;}
  /* page-input modal */
  .pg-modal{max-width:340px;}
  .pg-modal .head{font-size:16px; font-weight:600; margin-bottom:3px;}
  .pg-modal .meta{font-size:12px; color:var(--mut2); margin-bottom:18px;}
  .pg-modal .label{font-size:13px; color:var(--mut2); margin-bottom:7px;}
  .pg-modal .input-row{display:flex; align-items:center; gap:8px; margin-bottom:14px;}
  .pg-modal .input-row input{font-size:22px; font-weight:500; width:96px; padding:9px 10px;
    border:1px solid #c8d3c0; border-radius:9px; text-align:center; margin-bottom:0;}
  .pg-modal .input-row .of{font-size:13.5px; color:var(--ink2);}
  .pg-modal .input-row .pc{font-size:13px; color:var(--btnstop); margin-left:auto;}
  .pg-modal .input-row .pc b{font-weight:600;}
  .quick-row{display:flex; gap:7px; margin-bottom:16px;}
  .quick-row span{flex:1; text-align:center; font-size:12.5px; color:var(--ink2);
    border:1px solid var(--line2); border-radius:8px; padding:7px; cursor:pointer; user-select:none;}
  .quick-row span:active{background:#f1f0ec;}
  .pg-info{padding-top:14px; border-top:1px solid var(--line); font-size:12.5px; color:var(--ink2); line-height:2;}
  .pg-info .k{color:var(--mut2);} .pg-info .v{float:right; color:var(--ink);}
  .pg-info .row{display:block;}
  .pg-modal .del-link{display:block; text-align:center; font-size:12px; color:#b08a8a; margin-top:14px; cursor:pointer;}

  @media (orientation:portrait){
    .subj-col{flex:0 0 52%;}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===== MAIN ===== -->
  <div id="screen-main" class="screen">
    <div class="topbar">
      <span class="date" id="m-date">—</span>
      <span class="total num" id="m-total">오늘 0시간 0분</span>
    </div>
    <div class="main-body">
      <div class="subj-col" id="subj-col"></div>
      <div class="grid-col" id="grid-col"></div>
    </div>
    <div class="botnav" id="botnav">
      <div class="nav-item active" id="nav-main" onclick="go('main')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><line x1="3.5" y1="9" x2="20.5" y2="9"/><line x1="8" y1="2.5" x2="8" y2="6"/><line x1="16" y1="2.5" x2="16" y2="6"/></svg>
        <span>기록</span>
      </div>
      <div class="nav-item" id="nav-stats" onclick="go('stats')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><line x1="5" y1="20" x2="5" y2="12"/><line x1="12" y1="20" x2="12" y2="6"/><line x1="19" y1="20" x2="19" y2="14"/></svg>
        <span>통계</span>
      </div>
      <div class="nav-item" id="nav-goal" onclick="go('goal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>
        <span>목표</span>
      </div>
      <div class="nav-item" id="nav-wb" onclick="go('wb')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M5 4.5h11a3 3 0 0 1 3 3V20H8a3 3 0 0 1-3-3z"/><path d="M5 17.5h14"/><path d="M9 8h6"/></svg>
        <span>문제집</span>
      </div>
      <div class="nav-item" id="nav-set" onclick="go('set')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
        <span>설정</span>
      </div>
      <span class="spacer"></span>
      <span class="today-btn" onclick="goToday()">오늘</span>
      <span class="arrow" onclick="shiftDay(-1)">‹</span>
      <span class="arrow" onclick="shiftDay(1)">›</span>
    </div>
  </div>

  <!-- ===== TIMER ===== -->
  <div id="screen-timer" class="screen hidden">
    <div class="timer-head" onclick="closeTimer()">‹ 메인으로</div>
    <div class="timer-body">
      <div class="char-box">
        <img class="char-img hidden" id="t-char-img" alt="공부 캐릭터">
        <div class="char-empty" id="t-char-empty">캐릭터</div>
      </div>
      <div class="timer-center">
        <div class="timer-subj"><span class="swatch" id="t-swatch"></span><span id="t-name">과목</span></div>
        <div class="timer-clock num" id="t-clock">00:00:00</div>
        <div class="timer-info" id="t-info"></div>
        <div class="timer-btn" id="t-btn" onclick="toggleTimer()">
          <svg id="t-btn-ico" width="30" height="30" viewBox="0 0 24 24" fill="#fff"><path d="M8 5l11 7-11 7z"/></svg>
          <span class="lbl" id="t-btn-lbl">시작</span>
        </div>
        <div class="timer-totals">
          <span>이 과목 <b id="t-subtotal" class="num">0:00:00</b></span>
          <span class="div">|</span>
          <span>오늘 총 <b id="t-daytotal">0시간 0분</b></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== STATS ===== -->
  <div id="screen-stats" class="screen hidden">
    <div class="scr-head"><span class="back" onclick="go('main')">‹ 메인</span><span class="t">통계</span><span class="sub" id="st-sub"></span></div>
    <div class="scr-body">
      <div class="stats-cols">
        <div class="stats-left">
          <div class="sec-label">요일별 공부 시간 (이번 주)</div>
          <div class="bars" id="st-bars"></div>
          <div class="bar-labels" id="st-labels"></div>
        </div>
        <div class="stats-right">
          <div class="sec-label">과목별 누적 (이번 주)</div>
          <div id="st-subjbars"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== GOAL ===== -->
  <div id="screen-goal" class="screen hidden">
    <div class="scr-head"><span class="back" onclick="go('main')">‹ 메인</span><span class="t">목표 &amp; 일지</span></div>
    <div class="scr-body">
      <div class="goal-cols">
        <div class="goal-left">
          <div class="ring-wrap">
            <svg viewBox="0 0 100 100" width="130" height="130">
              <circle cx="50" cy="50" r="42" fill="none" stroke="#f0efeb" stroke-width="8"/>
              <circle id="g-ring" cx="50" cy="50" r="42" fill="none" stroke="var(--accent)" stroke-width="8"
                stroke-linecap="round" stroke-dasharray="263.9" stroke-dashoffset="263.9" transform="rotate(-90 50 50)"/>
            </svg>
            <div class="ring-pct num" id="g-pct">0%</div>
          </div>
          <div class="goal-sub num">오늘 <span id="g-goal">6시간</span> 중 <b id="g-done">0시간 0분</b></div>
          <button class="mini-btn" onclick="openGoalModal()">목표 시간 수정</button>
        </div>
        <div class="goal-right">
          <div class="sec-label">오늘의 공부 일지</div>
          <textarea class="memo-area" id="g-memo" placeholder="오늘 공부한 내용을 적어보세요…"></textarea>
          <button class="save-btn" onclick="saveMemo(event)">저장</button>
          <div class="reset-row">
            <button class="reset-btn" onclick="resetToday()">오늘 기록만 초기화</button>
            <button class="reset-btn full" onclick="resetAll()">전체 초기화</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== WORKBOOK ===== -->
  <div id="screen-wb" class="screen hidden">
    <div class="scr-head">
      <span class="back" onclick="go('main')">‹ 메인</span>
      <span class="t">문제집</span>
      <span style="flex:1"></span>
      <span class="today-btn" onclick="openAddWb()">+ 추가</span>
    </div>
    <div class="wb-sort" id="wb-sort"></div>
    <div class="scr-body" id="wb-body" style="padding:6px 18px 16px;"></div>
  </div>

  <!-- ===== SETTINGS ===== -->
  <div id="screen-set" class="screen hidden">
    <div class="scr-head"><span class="back" onclick="go('main')">‹ 메인</span><span class="t">과목 &amp; 테마</span></div>
    <div class="scr-body">
      <div class="set-cols">
        <div class="set-left">
          <div class="sec-label">과목 편집</div>
          <div id="set-subj"></div>
          <div class="add-line">
            <input id="ns-name" placeholder="새 과목 이름">
            <button onclick="addSubj()">추가</button>
          </div>
          <div style="font-size:12px;color:var(--mut2);margin-top:10px;line-height:1.5;">색은 선택한 테마에 맞춰 자동 배정돼요. 과목을 눌러 색을 직접 바꿀 수도 있어요.</div>
        </div>
        <div class="set-right">
          <div class="sec-label">테마 선택</div>
          <div id="set-themes"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="modal-mount"></div>

<script>
/* ============ THEMES (9-step ramps, dark->light, 국영수 darkest) ============ */
var THEMES = {
  summer:{label:'여름 · 초록', colors:['#3f5840','#496149','#566e50','#657c5b','#76896a','#889979','#9aa98b','#acb89e','#bdc7b1']},
  autumn:{label:'단풍 · 낙엽', colors:['#7a3b2e','#8c4733','#9c5a35','#a8703a','#b08842','#a98f4e','#9c8b52','#8f7d4a','#b9a574']},
  winter:{label:'겨울 · 무채', colors:['#3a3a3c','#48484a','#58585b','#6b6b6e','#7f7f82','#949497','#aaaaac','#c0c0c2','#d4d4d6']},
  spring:{label:'봄 · 파스텔', colors:['#6b5a6e','#7a6575','#897380','#9a8488','#a89593','#b6a89e','#c3b8a9','#cfc6b6','#dad3c4']},
  dusk:{label:'노을 · 더스크', colors:['#4a3340','#583c4a','#674857','#785566','#896575','#9a7886','#ab8c97','#bba2aa','#c9b8bd']},
  sea:{label:'심해 · 딥블루', colors:['#2f3f4a','#384b58','#435a68','#516a78','#627b89','#74909c','#88a4af','#9db8c1','#b3cbd2']},
  mist:{label:'안개숲 · 세이지', colors:['#36473f','#3f5249','#4a5e54','#586c61','#6a7d72','#7e9085','#94a499','#aab8ad','#bfcabf']},
  wine:{label:'와인 · 버건디', colors:['#4a2730','#5a2f38','#6b3842','#7d454e','#8d555d','#9c6770','#aa7c84','#b89399','#c6abae']},
  coffee:{label:'커피 · 로스트', colors:['#3d2e25','#4b392d','#5b4838','#6e5945','#816c55','#937f67','#a5937c','#b6a892','#c7bda9']},
  indigo:{label:'밤하늘 · 인디고', colors:['#33334a','#3c3c57','#474766','#555578','#666689','#7a7a9a','#9090ab','#a7a7bc','#bfbfcd']},
  lavender:{label:'라벤더 · 연보라', colors:['#4d4359','#594e66','#675c74','#776c84','#877d93','#9890a3','#a9a3b2','#bab6c1','#cbc8d0']},
  peach:{label:'복숭아 · 코랄', colors:['#7a4438','#8a5042','#985e4d','#a5705c','#af836f','#b89784','#c1ab9a','#cabfb1','#d3d0c6']}
};
var THEME_ORDER=['summer','autumn','winter','spring','dusk','sea','mist','wine','coffee','indigo','lavender','peach'];

var DEFAULT_SUBJECT_NAMES=['국어','수학','영어','기하','물리학','화학','생명과학','독일어','학교'];
var DAY_START_HOUR=5, SLOT_MIN=10, SLOTS_PER_HOUR=6, MINUTES_PER_DAY=1440;
var LS_KEY='studytracker_v2';

/* ============ STATE ============ */
var state=null, viewDate=null, activeTimer=null, tickHandle=null, currentScreen='main';

/* ============ DAY HELPERS (5am boundary) ============ */
function ymd(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function studyDayKey(d){var x=new Date(d.getTime()); if(x.getHours()<DAY_START_HOUR){x.setDate(x.getDate()-1);} return ymd(x);}
function todayKey(){return studyDayKey(new Date());}
function keyToDate(k){var p=k.split('-'); return new Date(+p[0],+p[1]-1,+p[2]);}
function dayStartMs(k){var d=keyToDate(k); d.setHours(DAY_START_HOUR,0,0,0); return d.getTime();}
function fmtDateHeader(k){var d=keyToDate(k),w=['일','월','화','수','목','금','토']; return d.getFullYear()+'. '+(d.getMonth()+1)+'. '+d.getDate()+' ('+w[d.getDay()]+')';}

/* ============ FORMAT ============ */
function fmtClock(s){s=Math.floor(s);return ('0'+Math.floor(s/3600)).slice(-2)+':'+('0'+Math.floor(s%3600/60)).slice(-2)+':'+('0'+(s%60)).slice(-2);}
function fmtHMS(s){s=Math.floor(s);return Math.floor(s/3600)+':'+('0'+Math.floor(s%3600/60)).slice(-2)+':'+('0'+(s%60)).slice(-2);}
function fmtKo(s){s=Math.floor(s);var h=Math.floor(s/3600),m=Math.floor(s%3600/60);return h+'시간 '+m+'분';}

/* ============ PERSISTENCE ============ */
function load(){
  try{var raw=localStorage.getItem(LS_KEY); if(raw) state=JSON.parse(raw);}catch(e){state=null;}
  if(!state){
    state={subjects:[], days:{}, goalMin:360, theme:'summer', workbooks:[], wbSort:'name'};
    DEFAULT_SUBJECT_NAMES.forEach(function(n,i){ state.subjects.push({id:'s'+i, name:n}); });
  }
  if(!state.subjects) state.subjects=[];
  if(!state.days) state.days={};
  if(typeof state.goalMin!=='number') state.goalMin=360;
  if(!state.theme||!THEMES[state.theme]) state.theme='summer';
  if(!state.workbooks) state.workbooks=[];
  if(!state.wbSort) state.wbSort='name';
  if(state.running) activeTimer=state.running;
}
function save(){ state.running=activeTimer; try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){} }

function getDay(k){
  if(!state.days[k]) state.days[k]={seconds:{}, minutes:{}, memo:''};
  var d=state.days[k];
  if(!d.seconds) d.seconds={};
  if(!d.minutes) d.minutes={};
  if(d.memo==null) d.memo='';
  return d;
}
function subjById(id){for(var i=0;i<state.subjects.length;i++) if(state.subjects[i].id===id) return state.subjects[i]; return null;}
function subjColor(id){
  var idx=-1; for(var i=0;i<state.subjects.length;i++) if(state.subjects[i].id===id){idx=i;break;}
  var s=subjById(id);
  if(s && s.color) return s.color;            // manual override
  var ramp=THEMES[state.theme].colors;
  if(idx<0) idx=0;
  return ramp[Math.min(idx, ramp.length-1)];
}

/* ============ MINUTE INDEX (0..1439 from 5am) ============ */
function minuteIndexFor(d){ return ((d.getHours()-DAY_START_HOUR+24)%24)*60 + d.getMinutes(); }

/* Two independent things are stored per day:
   - rec.seconds[subjId] : PRECISE accumulated seconds (source of truth for all time totals)
   - rec.minutes[mi]     : which subject owns each 1-minute timeline cell (only for painting)
   These never feed each other, so there is no double counting. */

/* commit precise elapsed seconds to the right study-day buckets (splits across 5am) */
function commitSeconds(subjId, startMs, endMs){
  var cur=startMs, guard=0;
  while(cur<endMs && guard<6000){
    guard++;
    var d=new Date(cur), dayK=studyDayKey(d);
    var b=new Date(d); b.setHours(DAY_START_HOUR,0,0,0);
    if(d.getHours()>=DAY_START_HOUR) b.setDate(b.getDate()+1);
    var segEnd=Math.min(endMs,b.getTime());
    var secs=Math.round((segEnd-cur)/1000);
    if(secs>0){ var rec=getDay(dayK); rec.seconds[subjId]=(rec.seconds[subjId]||0)+secs; }
    cur=segEnd;
  }
}

/* paint the timeline minutes the session covered (idempotent; just sets ownership) */
function paintMinutes(subjId, startMs, endMs){
  var startMin=Math.floor(startMs/60000), endMin=Math.floor((endMs-1)/60000);
  for(var m=startMin;m<=endMin;m++){
    var mStart=m*60000, mEnd=mStart+60000;
    var covered=Math.min(endMs,mEnd)-Math.max(startMs,mStart);
    if(covered<30000) continue;              // a minute cell needs >=30s to be claimed
    var mid=new Date(mStart+30000), dayK=studyDayKey(mid), rec=getDay(dayK);
    rec.minutes[minuteIndexFor(mid)]=subjId;
  }
}

/* live seconds of the current running session that fall inside dayK */
function liveExtraSeconds(dayK, subjId){
  if(!activeTimer) return 0;
  if(subjId!=null && activeTimer.subjId!==subjId) return 0;
  var now=Date.now(), s=activeTimer.startMs;
  var winStart=dayStartMs(dayK), winEnd=winStart+MINUTES_PER_DAY*60000;
  var from=Math.max(s,winStart), to=Math.min(now,winEnd);
  if(to<=from) return 0;
  return Math.floor((to-from)/1000);
}
function storedSeconds(dayK, subjId){
  var rec=getDay(dayK);
  if(subjId!=null) return rec.seconds[subjId]||0;
  var t=0; for(var k in rec.seconds) t+=rec.seconds[k]; return t;
}
function subjectSeconds(dayK, subjId){ return storedSeconds(dayK,subjId)+liveExtraSeconds(dayK,subjId); }
function dayTotalSeconds(dayK){ return storedSeconds(dayK,null)+liveExtraSeconds(dayK,null); }

/* ============ TIMER ============ */
function openTimer(subjId){
  var s=subjById(subjId); if(!s) return;
  document.getElementById('t-btn').dataset.subj=subjId;
  document.getElementById('t-swatch').style.background=subjColor(subjId);
  document.getElementById('t-name').textContent=s.name;
  currentScreen='timer';
  showOnly('screen-timer');
  refreshTimer();
}
function closeTimer(){ go('main'); }
function toggleTimer(){
  var subjId=document.getElementById('t-btn').dataset.subj;
  if(activeTimer && activeTimer.subjId===subjId){ stopTimer(); }
  else{ if(activeTimer) stopTimer(); startTimer(subjId); }
}
function startTimer(subjId){ activeTimer={subjId:subjId, startMs:Date.now(), painted:Date.now()}; save(); startTick(); refreshTimer(); refreshTimerClock(); }
function stopTimer(){
  if(!activeTimer) return;
  var s=activeTimer.startMs, e=Date.now(), id=activeTimer.subjId;
  commitSeconds(id, s, e);     // precise seconds, no minimum — even a few seconds count
  paintMinutes(id, s, e);      // timeline cells
  activeTimer=null; save(); stopTick(); refreshTimer();
}
function startTick(){ stopTick(); tickHandle=setInterval(tick,1000); }
function stopTick(){ if(tickHandle){clearInterval(tickHandle);tickHandle=null;} }
function tick(){
  if(activeTimer){
    refreshTimerClock();   // keep the big clock moving whenever a session is running
    paintMinutes(activeTimer.subjId, activeTimer.startMs, Date.now());
  }
  if(currentScreen==='main'){ renderSubjects(); renderTotal(); renderGrid(); }
  if(currentScreen==='timer'){ refreshTimerTotals(); updateCharStage(); }
}
function refreshTimerClock(){ if(activeTimer) document.getElementById('t-clock').textContent=fmtClock((Date.now()-activeTimer.startMs)/1000); }
function refreshTimerTotals(){
  var subjId=document.getElementById('t-btn').dataset.subj;
  document.getElementById('t-subtotal').textContent=fmtHMS(subjectSeconds(todayKey(),subjId));
  document.getElementById('t-daytotal').textContent=fmtKo(dayTotalSeconds(todayKey()));
}
function refreshTimer(){
  var subjId=document.getElementById('t-btn').dataset.subj;
  var running=activeTimer&&activeTimer.subjId===subjId;
  var btn=document.getElementById('t-btn');
  btn.style.background = running ? '#6b6457' : 'var(--btn)';
  document.getElementById('t-btn-ico').innerHTML = running
    ? '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>'
    : '<path d="M8 5l11 7-11 7z"/>';
  document.getElementById('t-btn-lbl').textContent = running ? '정지' : '시작';
  if(running){
    refreshTimerClock();
    var st=new Date(activeTimer.startMs);
    document.getElementById('t-info').textContent=('0'+st.getHours()).slice(-2)+':'+('0'+st.getMinutes()).slice(-2)+' 시작 · 측정 중';
  }else{
    document.getElementById('t-clock').textContent='00:00:00';
    document.getElementById('t-info').textContent='';
  }
  refreshTimerTotals();
  updateCharStage();
}
function updateCharStage(){
  var totalSec=dayTotalSeconds(todayKey());
  var stage=Math.max(0, Math.min(10, Math.floor(totalSec/3600))); // exact hour boundary
  var img=document.getElementById('t-char-img'), empty=document.getElementById('t-char-empty');
  if(typeof CHAR_IMAGES!=='undefined' && CHAR_IMAGES[stage]){
    img.src=CHAR_IMAGES[stage]; img.classList.remove('hidden'); empty.classList.add('hidden');
  }else{
    img.classList.add('hidden'); empty.classList.remove('hidden');
  }
}

/* ============ RENDER MAIN ============ */
function renderAll(){ applyTheme(); renderHeader(); renderSubjects(); renderGrid(); renderTotal(); }
function applyTheme(){ document.documentElement.style.setProperty('--accent', THEMES[state.theme].colors[0]); }
function renderHeader(){ document.getElementById('m-date').textContent=fmtDateHeader(viewDate); }
function renderTotal(){ document.getElementById('m-total').textContent='오늘 '+fmtKo(dayTotalSeconds(viewDate)); }
function renderSubjects(){
  var col=document.getElementById('subj-col'), html='';
  for(var i=0;i<state.subjects.length;i++){
    var s=state.subjects[i], running=activeTimer&&activeTimer.subjId===s.id;
    html+='<div class="subj-row'+(running?' running':'')+'" onclick="openTimer(\''+s.id+'\')">'
      +'<span class="swatch" style="background:'+subjColor(s.id)+'"></span>'
      +'<span class="sname">'+esc(s.name)+'</span>'
      +'<span class="stime num">'+fmtHMS(subjectSeconds(viewDate,s.id))+'</span></div>';
  }
  html+='<div class="add-row" onclick="go(\'set\')"><span class="add-circle">+</span><span>과목 편집</span></div>';
  col.innerHTML=html;
}
function renderGrid(){
  var col=document.getElementById('grid-col'), rec=getDay(viewDate);
  // build per-hour-row, per-slot proportional segments from minute data
  var html='';
  for(var r=0;r<24;r++){
    var hr=(DAY_START_HOUR+r)%24, disp=hr===0?12:(hr>12?hr-12:hr);
    html+='<div class="grow"><div class="ghour">'+disp+'</div><div class="gcells">';
    for(var c=0;c<SLOTS_PER_HOUR;c++){
      // this slot covers 10 minutes: minuteIndex base
      var base=r*60 + c*SLOT_MIN;
      // collect the 10 one-minute entries
      var segs=[]; // sequence of subjId or null
      for(var mm=0;mm<SLOT_MIN;mm++){ segs.push(rec.minutes[base+mm]||null); }
      html+='<div class="gcell">'+segHtml(segs)+'</div>';
    }
    html+='</div></div>';
  }
  html+='<div class="gbottom"></div>';
  col.innerHTML=html;
}
function segHtml(segs){
  // each minute = 10% width; merge consecutive same
  var out='<div class="seg">'; var i=0;
  while(i<segs.length){
    var v=segs[i], n=1;
    while(i+n<segs.length && segs[i+n]===v) n++;
    var w=n*100/segs.length;
    var bg = v ? subjColor(v) : 'transparent';
    out+='<div style="width:'+w+'%;background:'+bg+';"></div>';
    i+=n;
  }
  return out+'</div>';
}
function esc(t){return (t+'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

/* ============ STATS ============ */
function weekKeys(){
  var d=keyToDate(todayKey()), dow=(d.getDay()+6)%7, mon=new Date(d); mon.setDate(d.getDate()-dow);
  var ks=[]; for(var i=0;i<7;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);ks.push(ymd(x));} return ks;
}
function renderStats(){
  var ks=weekKeys(), names=['월','화','수','목','금','토','일'];
  var totals=ks.map(function(k){return dayTotalSeconds(k);});
  var max=Math.max.apply(null,totals.concat([1]));
  document.getElementById('st-sub').textContent='이번 주 · '+fmtKo(totals.reduce(function(a,b){return a+b;},0));
  document.getElementById('st-bars').innerHTML=totals.map(function(t,i){
    var h=Math.round(t/max*130), today=ks[i]===todayKey();
    return '<div class="bar-wrap"><div class="bar" style="height:'+h+'px;background:'+(today?THEMES[state.theme].colors[0]:THEMES[state.theme].colors[6])+';"></div></div>';
  }).join('');
  document.getElementById('st-labels').innerHTML=names.map(function(n,i){return '<span class="'+(ks[i]===todayKey()?'today':'')+'">'+n+'</span>';}).join('');
  var subjTot={};
  ks.forEach(function(k){var rec=getDay(k); for(var id in rec.seconds){ subjTot[id]=(subjTot[id]||0)+rec.seconds[id]; }});
  var arr=state.subjects.map(function(s){return {s:s,sec:subjTot[s.id]||0};}).sort(function(a,b){return b.sec-a.sec;});
  var smax=Math.max.apply(null,arr.map(function(a){return a.sec;}).concat([1]));
  var h='';
  arr.forEach(function(a){
    if(a.sec===0) return;
    var w=Math.round(a.sec/smax*100), hh=Math.floor(a.sec/3600), mm=Math.floor(a.sec%3600/60);
    h+='<div class="subjbar-row"><span class="subjbar-name">'+esc(a.s.name)+'</span>'
      +'<div class="subjbar-track"><div class="subjbar-fill" style="width:'+w+'%;background:'+subjColor(a.s.id)+';"></div></div>'
      +'<span class="subjbar-time num">'+hh+'h '+mm+'m</span></div>';
  });
  document.getElementById('st-subjbars').innerHTML=h||'<div style="color:var(--faint);font-size:13px;">이번 주 기록이 없어요.</div>';
}

/* ============ GOAL ============ */
function renderGoal(){
  var done=dayTotalSeconds(viewDate), goal=state.goalMin*60;
  var pct=goal>0?Math.min(100,Math.round(done/goal*100)):0;
  document.getElementById('g-pct').textContent=pct+'%';
  var circ=263.9; document.getElementById('g-ring').setAttribute('stroke-dashoffset', circ-circ*Math.min(1,goal?done/goal:0));
  document.getElementById('g-goal').textContent=fmtKo(goal);
  document.getElementById('g-done').textContent=fmtKo(done);
  document.getElementById('g-memo').value=getDay(viewDate).memo||'';
}
function saveMemo(e){ getDay(viewDate).memo=document.getElementById('g-memo').value; save();
  var b=e.target, o=b.textContent; b.textContent='저장됨'; setTimeout(function(){b.textContent=o;},1200); }

/* ============ SETTINGS ============ */
function renderSettings(){
  var html='';
  state.subjects.forEach(function(s){
    html+='<div class="subj-edit-item"><span class="swatch" style="background:'+subjColor(s.id)+'"></span>'
      +'<span class="nm">'+esc(s.name)+'</span>'
      +'<span class="ed" onclick="editSubjColor(\''+s.id+'\')">색</span>'
      +'<span class="del" onclick="delSubj(\''+s.id+'\')">×</span></div>';
  });
  document.getElementById('set-subj').innerHTML=html;
  var th='';
  THEME_ORDER.forEach(function(key){
    var t=THEMES[key], sel=state.theme===key;
    th+='<div class="theme-item'+(sel?' sel':'')+'" onclick="pickTheme(\''+key+'\')">'
      +'<div class="theme-swatch">'+[0,2,4,6,8].map(function(i){return '<div style="background:'+t.colors[i]+';"></div>';}).join('')+'</div>'
      +'<span class="theme-name">'+t.label+'</span>'+(sel?'<span class="theme-check">✓</span>':'')+'</div>';
  });
  document.getElementById('set-themes').innerHTML=th;
}
function pickTheme(key){ state.theme=key; save(); applyTheme(); renderSettings(); }
function addSubj(){
  var v=(document.getElementById('ns-name').value||'').trim(); if(!v) return;
  state.subjects.push({id:'s'+Date.now(), name:v}); save();
  document.getElementById('ns-name').value=''; renderSettings();
}
function delSubj(id){
  if(activeTimer&&activeTimer.subjId===id){ alert('측정 중인 과목은 삭제할 수 없어요.'); return; }
  modalConfirm('과목 삭제','이 과목을 삭제할까요? 기존 기록의 색만 사라지고 시간은 남아요.',function(){
    state.subjects=state.subjects.filter(function(s){return s.id!==id;}); save(); renderSettings(); });
}
function editSubjColor(id){
  var ramp=THEMES[state.theme].colors.concat(['#3a3a3c','#7a3b2e','#2f3f4a']);
  var cur=subjColor(id);
  var dots=ramp.map(function(c){return '<span class="color-dot'+(c===cur?' sel':'')+'" style="background:'+c+'" onclick="setSubjColor(\''+id+'\',\''+c+'\',this)"></span>';}).join('');
  modal('<h3>과목 색</h3><p>이 과목의 색을 직접 골라요.</p><div class="color-grid">'+dots+'</div>'
    +'<div class="modal-row"><button class="modal-btn ghost" onclick="resetSubjColor(\''+id+'\')">테마색으로</button>'
    +'<button class="modal-btn solid" onclick="closeModal()">완료</button></div>');
}
function setSubjColor(id,c,el){ var s=subjById(id); if(s){s.color=c; save();}
  var ds=el.parentNode.querySelectorAll('.color-dot'); for(var i=0;i<ds.length;i++) ds[i].classList.remove('sel'); el.classList.add('sel');
  renderSettings(); }
function resetSubjColor(id){ var s=subjById(id); if(s){delete s.color; save();} closeModal(); renderSettings(); }

/* ============ MODALS ============ */
function modal(html){ document.getElementById('modal-mount').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>'; }
function closeModal(){ document.getElementById('modal-mount').innerHTML=''; }
function modalConfirm(title,msg,onYes,danger){
  window.__yes=onYes;
  modal('<h3>'+title+'</h3><p>'+msg+'</p><div class="modal-row"><button class="modal-btn ghost" onclick="closeModal()">취소</button>'
    +'<button class="modal-btn '+(danger?'danger':'solid')+'" onclick="(window.__yes||function(){})();closeModal();">확인</button></div>');
}
function openGoalModal(){
  var h=Math.floor(state.goalMin/60),m=state.goalMin%60;
  modal('<h3>하루 목표 시간</h3><p>매일 목표로 할 공부 시간을 정하세요.</p>'
    +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">'
    +'<input id="gm-h" type="number" min="0" max="24" value="'+h+'" style="margin:0"><span>시간</span>'
    +'<input id="gm-m" type="number" min="0" max="59" value="'+m+'" style="margin:0"><span>분</span></div>'
    +'<div class="modal-row"><button class="modal-btn ghost" onclick="closeModal()">취소</button>'
    +'<button class="modal-btn solid" onclick="saveGoal()">저장</button></div>');
}
function saveGoal(){ var h=+document.getElementById('gm-h').value||0,m=+document.getElementById('gm-m').value||0;
  state.goalMin=h*60+m; save(); closeModal(); renderGoal(); }
function resetToday(){
  modalConfirm('오늘 기록 초기화', fmtDateHeader(viewDate)+'의 측정 시간·타임라인·일지가 삭제돼요. 되돌릴 수 없어요.',function(){
    if(activeTimer&&studyDayKey(new Date())===viewDate){ activeTimer=null; stopTick(); }
    delete state.days[viewDate]; save(); renderAll();
  },true);
}
function resetAll(){
  modalConfirm('전체 데이터 초기화','모든 날짜의 기록과 설정이 전부 삭제돼요. 정말 되돌릴 수 없어요.',function(){
    activeTimer=null; stopTick(); localStorage.removeItem(LS_KEY); state=null; load(); viewDate=todayKey(); renderAll(); go('main');
  },true);
}

/* ============ WORKBOOKS ============ */
function wbProgress(w){
  var total=w.endPage-w.startPage+1;
  if(total<=0) return 0;
  var done=Math.max(0, Math.min(total, (w.currentPage||w.startPage-1)-w.startPage+1));
  // currentPage represents "last page completed"; default 0% before any input (currentPage = startPage-1)
  return Math.round(done/total*1000)/10; // one decimal
}
function wbIsDone(w){ return (w.currentPage||0) >= w.endPage; }
function wbSubjName(w){ var s=subjById(w.subjId); return s?s.name:'(과목 없음)'; }
function wbSortedList(){
  var arr=state.workbooks.slice();
  var sort=state.wbSort;
  if(sort==='name'){
    arr.sort(function(a,b){return a.name.localeCompare(b.name,'ko');});
  }else if(sort==='subject'){
    var order={}; state.subjects.forEach(function(s,i){order[s.id]=i;});
    arr.sort(function(a,b){
      var oa=order[a.subjId]==null?999:order[a.subjId];
      var ob=order[b.subjId]==null?999:order[b.subjId];
      if(oa!==ob) return oa-ob;
      return a.name.localeCompare(b.name,'ko');
    });
  }else if(sort==='progress'){
    arr.sort(function(a,b){return wbProgress(b)-wbProgress(a);});
  }
  return arr;
}
function renderWorkbooks(){
  var sort=state.wbSort;
  var opts=[['name','가나다'],['subject','과목순'],['progress','진도율순']];
  document.getElementById('wb-sort').innerHTML='<span class="lbl">정렬</span>'
    + opts.map(function(o){return '<span class="opt'+(o[0]===sort?' sel':'')+'" onclick="setWbSort(\''+o[0]+'\')">'+o[1]+'</span>';}).join('');
  var body=document.getElementById('wb-body');
  if(state.workbooks.length===0){
    body.innerHTML='<div class="wb-empty">아직 등록한 문제집이 없어요.<br>오른쪽 위 <b>+ 추가</b>로 시작해보세요.</div>';
    return;
  }
  var html='';
  wbSortedList().forEach(function(w){
    var col=subjColor(w.subjId);
    var pct=wbProgress(w);
    var done=wbIsDone(w);
    var pgTxt = done ? ('완료 · '+w.endPage+'p')
                     : ((w.currentPage||w.startPage-1)+' / '+w.endPage+'p');
    var width=Math.max(0,Math.min(100,pct));
    html+='<div class="wb-card'+(done?' done':'')+'" onclick="openWbCard(\''+w.id+'\')">'
      +'<span class="bar" style="background:'+col+'"></span>'
      +'<div class="body">'
      +'<div class="top"><span class="nm">'+esc(w.name)+'</span><span class="sb">'+esc(wbSubjName(w))+'</span><span class="pg num">'+pgTxt+'</span></div>'
      +'<div class="row"><div class="track"><div class="fill" style="width:'+width+'%; background:'+col+';"></div></div>'
      +'<span class="pct num">'+Math.round(pct)+'%</span></div>'
      +'</div></div>';
  });
  body.innerHTML=html;
}
function setWbSort(s){ state.wbSort=s; save(); renderWorkbooks(); }

function openAddWb(){
  if(state.subjects.length===0){ alert('먼저 설정에서 과목을 추가해주세요.'); return; }
  var subjOpts=state.subjects.map(function(s,i){return '<option value="'+s.id+'">'+esc(s.name)+'</option>';}).join('');
  modal('<h3>새 문제집</h3>'
    +'<div class="label" style="font-size:13px;color:var(--mut2);margin-bottom:6px;">이름</div>'
    +'<input id="wb-name" placeholder="예: 수학의 정석 (상)">'
    +'<div class="label" style="font-size:13px;color:var(--mut2);margin:6px 0;">과목</div>'
    +'<select id="wb-subj" style="width:100%;padding:10px;border:1px solid var(--line2);border-radius:9px;font-size:15px;margin-bottom:8px;font-family:inherit;background:#fff;">'+subjOpts+'</select>'
    +'<div class="label" style="font-size:13px;color:var(--mut2);margin:6px 0;">페이지 범위</div>'
    +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">'
    +'<input id="wb-start" type="number" min="1" value="1" style="margin:0;width:80px;text-align:center;">'
    +'<span style="color:var(--mut);">~</span>'
    +'<input id="wb-end" type="number" min="1" value="200" style="margin:0;width:80px;text-align:center;">'
    +'<span style="color:var(--mut);font-size:13px;">페이지</span></div>'
    +'<div class="modal-row"><button class="modal-btn ghost" onclick="closeModal()">취소</button>'
    +'<button class="modal-btn solid" onclick="saveNewWb()">추가</button></div>');
}
function saveNewWb(){
  var name=(document.getElementById('wb-name').value||'').trim();
  var subjId=document.getElementById('wb-subj').value;
  var sp=parseInt(document.getElementById('wb-start').value||'1',10);
  var ep=parseInt(document.getElementById('wb-end').value||'0',10);
  if(!name){ alert('이름을 입력해주세요.'); return; }
  if(!(ep>=sp)){ alert('끝 페이지는 시작 페이지보다 같거나 커야 해요.'); return; }
  state.workbooks.push({id:'w'+Date.now(), name:name, subjId:subjId, startPage:sp, endPage:ep, currentPage:sp-1});
  save(); closeModal(); renderWorkbooks();
}

function getWb(id){ for(var i=0;i<state.workbooks.length;i++) if(state.workbooks[i].id===id) return state.workbooks[i]; return null; }

function openWbCard(id){
  var w=getWb(id); if(!w) return;
  var subjOpts=state.subjects.map(function(s){return '<option value="'+s.id+'"'+(s.id===w.subjId?' selected':'')+'>'+esc(s.name)+'</option>';}).join('');
  var cur=(w.currentPage||w.startPage-1);
  var pct=wbProgress(w);
  modal('<div class="pg-modal">'
    +'<div class="head">'+esc(w.name)+'</div>'
    +'<div class="meta">'+esc(wbSubjName(w))+' · '+w.startPage+'p부터 '+w.endPage+'p까지</div>'
    +'<div class="label">현재 어디까지 풀었어요?</div>'
    +'<div class="input-row"><input id="pg-cur" type="number" min="'+(w.startPage-1)+'" max="'+w.endPage+'" value="'+cur+'">'
    +'<span class="of">/ '+w.endPage+'p</span><span class="pc"><b id="pg-pct" class="num">'+Math.round(pct)+'%</b> 진행</span></div>'
    +'<div class="quick-row">'
    +'<span onclick="pgAdd(-10)">-10</span><span onclick="pgAdd(-1)">-1</span>'
    +'<span onclick="pgAdd(1)">+1</span><span onclick="pgAdd(10)">+10</span></div>'
    +'<div class="pg-info">'
    +'<div class="row"><span class="k">이름</span><input id="pg-name" value="'+esc(w.name)+'" style="float:right;width:60%;text-align:right;margin:0;padding:6px 8px;font-size:13px;border:1px solid #eee;border-radius:6px;"></div>'
    +'<div class="row"><span class="k">과목</span><select id="pg-subj" style="float:right;width:60%;padding:6px 8px;font-size:13px;border:1px solid #eee;border-radius:6px;font-family:inherit;background:#fff;text-align-last:right;">'+subjOpts+'</select></div>'
    +'<div class="row"><span class="k">범위</span><span class="v"><input id="pg-start" type="number" value="'+w.startPage+'" style="width:46px;text-align:center;margin:0;padding:4px;font-size:13px;border:1px solid #eee;border-radius:6px;"> ~ '
    +'<input id="pg-end" type="number" value="'+w.endPage+'" style="width:46px;text-align:center;margin:0;padding:4px;font-size:13px;border:1px solid #eee;border-radius:6px;"> p</span></div>'
    +'</div>'
    +'<div class="modal-row"><button class="modal-btn ghost" onclick="closeModal()">취소</button>'
    +'<button class="modal-btn solid" onclick="saveWbCard(\''+id+'\')">저장</button></div>'
    +'<span class="del-link" onclick="delWb(\''+id+'\')">이 문제집 삭제</span>'
    +'</div>');
  // live progress update
  document.getElementById('pg-cur').addEventListener('input', function(){
    var v=parseInt(this.value||'0',10);
    var sp=parseInt(document.getElementById('pg-start').value||'1',10);
    var ep=parseInt(document.getElementById('pg-end').value||'0',10);
    var tot=ep-sp+1; if(tot<=0){ document.getElementById('pg-pct').textContent='0%'; return; }
    var dn=Math.max(0,Math.min(tot, v-sp+1));
    document.getElementById('pg-pct').textContent=Math.round(dn/tot*100)+'%';
  });
}
function pgAdd(delta){
  var el=document.getElementById('pg-cur'); if(!el) return;
  var sp=parseInt(document.getElementById('pg-start').value||'1',10);
  var ep=parseInt(document.getElementById('pg-end').value||'0',10);
  var v=(parseInt(el.value||'0',10)||0)+delta;
  if(v<sp-1) v=sp-1; if(v>ep) v=ep;
  el.value=v; el.dispatchEvent(new Event('input'));
}
function saveWbCard(id){
  var w=getWb(id); if(!w) return;
  var nm=(document.getElementById('pg-name').value||'').trim();
  var sj=document.getElementById('pg-subj').value;
  var sp=parseInt(document.getElementById('pg-start').value||'1',10);
  var ep=parseInt(document.getElementById('pg-end').value||'0',10);
  var cu=parseInt(document.getElementById('pg-cur').value||'0',10);
  if(!nm){ alert('이름을 입력해주세요.'); return; }
  if(!(ep>=sp)){ alert('끝 페이지는 시작 페이지보다 같거나 커야 해요.'); return; }
  if(cu<sp-1) cu=sp-1; if(cu>ep) cu=ep;
  w.name=nm; w.subjId=sj; w.startPage=sp; w.endPage=ep; w.currentPage=cu;
  save(); closeModal(); renderWorkbooks();
}
function delWb(id){
  modalConfirm('문제집 삭제','이 문제집을 정말 삭제할까요? 진도 기록이 함께 사라져요.',function(){
    state.workbooks=state.workbooks.filter(function(x){return x.id!==id;});
    save(); closeModal(); renderWorkbooks();
  },true);
}

/* ============ NAV ============ */
function showOnly(id){ ['screen-main','screen-timer','screen-stats','screen-goal','screen-wb','screen-set'].forEach(function(s){ document.getElementById(s).classList.toggle('hidden',s!==id); }); }
function go(which){
  currentScreen=which;
  if(which==='main'){ showOnly('screen-main'); renderAll(); }
  if(which==='stats'){ showOnly('screen-stats'); renderStats(); }
  if(which==='goal'){ showOnly('screen-goal'); renderGoal(); }
  if(which==='wb'){ showOnly('screen-wb'); renderWorkbooks(); }
  if(which==='set'){ showOnly('screen-set'); renderSettings(); }
  ['main','stats','goal','wb','set'].forEach(function(n){ var el=document.getElementById('nav-'+n); if(el) el.classList.toggle('active', n===which); });
}
function shiftDay(delta){ var d=keyToDate(viewDate); d.setDate(d.getDate()+delta); viewDate=ymd(d); go('main'); }
function goToday(){ viewDate=todayKey(); go('main'); }

/* ============ RESPONSIVE ROW SIZING ============ */
function fitRows(){
  // size timeline rows so all 24 fit without scroll in the available height
  var gridCol=document.getElementById('grid-col');
  if(!gridCol) return;
  var avail=gridCol.clientHeight-14;
  var cellh=Math.max(11, Math.floor(avail/24));
  document.documentElement.style.setProperty('--cellh', cellh+'px');
  document.querySelectorAll('.grow').forEach(function(g){ g.style.height=cellh+'px'; });
  document.querySelectorAll('.ghour').forEach(function(g){ g.style.lineHeight=cellh+'px'; });
  // subject rows: spread to fill if few subjects, else natural
  var subjCol=document.getElementById('subj-col');
  var n=state.subjects.length+1;
  var rh=Math.max(34, Math.min(52, Math.floor((subjCol.clientHeight-10)/n)));
  document.documentElement.style.setProperty('--rowh', rh+'px');
}

/* ============ INIT ============ */
function init(){
  load(); viewDate=todayKey();
  if(activeTimer) startTick();
  renderAll(); go('main');
  setTimeout(fitRows,60);
  window.addEventListener('resize', function(){ if(currentScreen==='main'){ renderGrid(); setTimeout(fitRows,40);} });
  window.addEventListener('orientationchange', function(){ setTimeout(function(){ if(currentScreen==='main'){renderGrid(); fitRows();} },200); });
  // midnight/5am rollover guard: refresh date if it changed while idle on main
  setInterval(function(){ if(currentScreen==='main'){ var tk=todayKey(); /* keep manual nav */ } }, 60000);
}
window.addEventListener('load', init);
